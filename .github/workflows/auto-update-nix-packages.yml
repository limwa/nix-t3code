name: Auto-update Nix packages

on:
  schedule:
    - cron: '23 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Run package updates
        shell: bash
        run: ./update.py

      - name: Push successful update commits
        if: always()
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ -z "$branch" ]; then
            branch="$(git rev-parse --abbrev-ref HEAD)"
          fi

          git push origin "HEAD:${branch}"
